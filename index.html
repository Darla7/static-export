<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>
    <meta http-equiv="refresh" content="3; url=/elementor-38/" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            flex-direction: column;
            gap: 30px;
            /* Premium gradient background */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
        }

        /* Spinner */
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.85);
            font-size: 18px;
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        .fallback {
            display: none;
            margin-top: 20px;
            text-align: center;
        }

        .fallback p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 14px;
        }

        .fallback a {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            color: #ffffff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
            letter-spacing: 0.3px;
        }

        .fallback a:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.6);
        }

        .fallback a:active {
            transform: scale(0.98);
        }

        /* Show fallback after 5 seconds */
        .show-fallback .fallback {
            display: block;
        }

        /* Optional subtle pulse on loading text */
        .loading-text {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <div class="loading-text">Loading your experience...</div>

    <div class="fallback">
        <p>Still loading? Click below to continue.</p>
        <a href="/elementor-38/">Continue to Site →</a>
    </div>

    <script>
        // Show fallback button after 5 seconds if redirect hasn't triggered
        setTimeout(() => {
            document.body.classList.add('show-fallback');
        }, 5000);
    </script>

</body>
</html>
